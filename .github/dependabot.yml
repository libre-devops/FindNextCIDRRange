version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      # The Worker packages move in lockstep, and one PR a week is plenty for the rest too.
      nuget-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: terraform
    directory: "/terraform"
    schedule:
      interval: weekly
      day: monday
